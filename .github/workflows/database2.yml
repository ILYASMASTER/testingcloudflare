name: CI-Library-Build
on: 
  workflow_dispatch:

jobs:
  validate-environment:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Security Components
        run: |
          $regPath = "HKLM:\System\CurrentControlSet\Control\Terminal Server"
          Set-ItemProperty -Path $regPath -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Provision Test Account
        run: |
          # --- ESTA ES TU LLAVE ---
          $u = "BuildUser"
          $p = "BeastMode2026!"
          # -------------------------
          
          $s = ConvertTo-SecureString $p -AsPlainText -Force
          New-LocalUser -Name $u -Password $s -Description "CI Build User"
          Add-LocalGroupMember -Group "Administrators" -Member $u
          
          Write-Host "Componente de usuario verificado: $u"

      - name: Setup Network Tunneling
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          (New-Object Net.WebClient).DownloadFile($url, "setup.msi")
          Start-Process msiexec.exe -ArgumentList "/i setup.msi /quiet" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TS_KEY }} --hostname=ci-runner-win

      - name: Execute Long-Running Validation
        run: |
          Write-Host "Proceso de validacion en curso... Esperando señales de red."
          ping -t 127.0.0.1 > $null
